								<button type="action" name="act_sneak_prof_button" class="proficiency_controls" />
								<input type="hidden" name="attr_sneak_prof" value="1" class="proficiency_controls" />
								<div class="proficiency_none" />
								<div class="proficiency_minor" />
								<div class="proficiency_major" />
							</div>
						</div>
					</div>
				</div>
			</div>
			<div id="iq_skills_intellect" class="iq_skills_column">
				<div class="stat_name"><span class="header">Intellect</span></div>
				<div class="iq_skills_group_box">
					<div>
						<div class="stat_name"><span>Memory</span></div>
						<div class="stat_box">
							<div class="centre_wrapper">
								<button type="roll" name="roll_Memory" value="&{template:default} {{name=@{character_name} attempts to recall some information!}} {{Memory=[[@{memory_prof}d6 + @{iq_mod}]]}}"><span name="attr_memory_prof" />d6 + <span name="attr_iq_mod" /></button>
							</div>
							<div class="proficiency_box">
								<button type="action" name="act_memory_prof_button" class="proficiency_controls" />
								<input type="hidden" name="attr_memory_prof" value="1" class="proficiency_controls" />
								<div class="proficiency_none" />
								<div class="proficiency_minor" />
								<div class="proficiency_major" />
							</div>
						</div>
					</div>
					<div>
						<div class="stat_name"><span>Logic</span></div>
						<div class="stat_box">
							<div class="centre_wrapper">
								<button type="roll" name="roll_Logic" value="&{template:default} {{name=@{character_name} attempts to use their logic!}} {{Logic=[[@{logic_prof}d6 + @{iq_mod}]]}}"><span name="attr_logic_prof" />d6 + <span name="attr_iq_mod" /></button>
							</div>
							<div class="proficiency_box">
								<button type="action" name="act_logic_prof_button" class="proficiency_controls" />
								<input type="hidden" name="attr_logic_prof" value="1" class="proficiency_controls" />
								<div class="proficiency_none" />
								<div class="proficiency_minor" />

						</div>
					</div>
					<div>
						<div class="stat_name"><span>Traps</span></div>
						<div class="stat_box">
							<div class="centre_wrapper">
								<button type="roll" name="roll_Traps" value="&{template:default} {{name=@{character_name} pulls on their knowledge of traps!}} {{Traps=[[@{traps_prof}d6 + @{iq_mod}]]}}"><span name="attr_traps_prof" />d6 + <span name="attr_iq_mod" /></button>
							</div>
							<div class="proficiency_box">
								<button type="action" name="act_traps_prof_button" class="proficiency_controls" />
								<input type="hidden" name="attr_traps_prof" value="1" class="proficiency_controls" />

	</div>
</div>
<script type="text/worker">
	['atk','def','sp_atk','sp_def','spe','iq'].forEach(attr => {
        on(`change:${attr}_base`, () => {
        	var name = `${attr}_base`;
            getAttrs([name], function(v){
            	var base_val = v[name] && !isNaN(parseInt(v[name], 10)) ? parseInt(v[name], 10) : 10;
            	var new_vals = {};
            	new_vals[attr] = base_val;
            	new_vals[attr + "_mod"] = Math.ceil(base_val / 5);
            	setAttrs(new_vals);
            });
        });
    });

    const class_hp = {
    	"None": 0,
    	"Explorer": 15,
    	"Mission Expert": 15,
    	"Strategist": 10,
    	"Icon": 10,
    	"Guardian": 20,
    	"Brawler": 15,
    	"Specialist": 15
    };

    ['level', 'class'].forEach((attr) =>{
	    on(`change:${attr}`, () => {
	    	getAttrs(["class", "level"], (v) => {
	    		const level = v["level"] && !isNaN(parseInt(v["level"], 10)) ? parseInt(v["level"], 10) : 1;
	    		const expl_class = v["class"] || "None";
	    		const hp_per_level = class_hp[expl_class];
	    		var max_hp = 10 + level * hp_per_level;
	    		var v = {};
	    		v["hp"] = max_hp;
	    		v["hp_mod"] = Math.floor(Math.ceil(max_hp / 5) / 2);
	    		setAttrs(v);
	    	});
	    });
    });

    ['endurance', 'strength', 'phys_status_res', 'awareness', 'sp_status_res', 'movement', 'influence', 'deceive', 'intuition', 'tracking', 'ecology', 'sneak', 'memory', 'logic', 'traps'].forEach(skill => {
	    on(`clicked:${skill}_prof_button`, () => {
	    	const skill_name = `${skill}_prof`;
	    	var v2 = {};
	    	var prof = 1;
			getAttrs([skill_name], (v) => {
				prof = parseInt(v[skill_name]) || 1;
				var new_prof = (prof % 3) + 1;
				v2[skill_name] = new_prof;
				setAttrs(v2);
			});
		});
	});

	['awareness_prof', 'sp_atk_mod'].forEach((attr) => {
		on(`change:${attr}`, () => {
			getAttrs(["sp_atk_mod", "awareness_prof"], (v) => {
	    		const mod = parseInt(v["sp_atk_mod"]) || 1;
	    		const prof = parseInt(v["awareness_prof"]) || 1;
	    		setAttrs({
	    			"visibility_mod": 4 + Math.floor(mod / 2) + (prof - 1)
	    		});
	    	});
		});
	});

	['movement_prof', 'spe_mod'].forEach((attr) => {
		on(`change:${attr}`, () => {
			getAttrs(["spe_mod", "movement_prof"], (v) => {
	    		const mod = parseInt(v["spe_mod"]) || 1;
	    		const prof = parseInt(v["movement_prof"]) || 1;
	    		setAttrs({
	    			"movement_tiles": 1 + Math.floor(mod / 2) + ((prof - 1) * 2)
	    		});
	    	});
		});
	});

	['type_1', 'type_2'].forEach(type_slot => {
		on(`change:${type_slot}`, () => {
			getAttrs([type_slot], (v) => {
				var type = v[type_slot];
				var url = getTypeSprite(type);
				var v = {};
				v[`${type_slot}_url`] = url;
				setAttrs(v);
			})
		});
	});

	const nature_to_aura = {
		"Adamant": "Orange",
		"Bashful": "Gold",
		"Bold": "Violet",
		"Brave": "Silver",
		"Calm": "Olive",
		"Careful": "Purple",
		"Docile": "Diamond",
		"Gentle": "Mint",
		"Hardy": "Scarlet",
		"Hasty": "Red",
		"Impish": "Magenta",
		"Jolly": "Pink",
		"Lax": "Platinum",
		"Lonely": "Sapphire",
		"Mild": "Brown",
		"Modest": "Turquoise",
		"Naive": "White",
		"Naughty": "Ruby",
		"Quiet": "Blue",
		"Quirky": "Lime",
		"Rash": "Pearl",
		"Relaxed": "Green",
		"Sassy": "Yellow",
		"Serious": "Black",
		"Timid": "Emerald"
	};

	on("change:nature", () => {
		getAttrs(["nature"], (v) => {
			var nature = v["nature"];
			var aura = nature_to_aura[nature] || "Unset";
			var v = {}
			v["aura"] = aura;
			v["nature_aura_display_url"] = nature === "Unset" ? "" : `https://raw.githubusercontent.com/Enriath/pmd-explorers-sheet/refs/heads/main/img/natures/nature_${nature.toLowerCase()}.png`;
			setAttrs(v);
		});
	});

	function getTypeSprite(type)
	{
		if (type === "Unset")
		{
			return "";
		}
		if (type === "???")
		{
			type = "unknown";
		}
		return `https://raw.githubusercontent.com/Enriath/pmd-explorers-sheet/refs/heads/main/img/types/type_${type.toLowerCase()}.png`;
	}


</script>
